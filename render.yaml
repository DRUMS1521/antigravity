services:
  - type: web
    name: comfenalco-backend
    runtime: python
    pythonVersion: 3.11
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: comfenalco-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://comfenalco-frontend.onrender.com
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 480
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587

  - type: web
    name: comfenalco-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://comfenalco-backend.onrender.com

databases:
  - name: comfenalco-db
    databaseName: comfenalco
    user: comfenalco_user
